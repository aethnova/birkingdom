<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birkingdom - Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 40px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(167,139,250,0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.2rem; color: #c4b5fd; margin-bottom: 8px; }
        p { color: #888; font-size: 0.9rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        code {
            display: block;
            margin-top: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            color: #c4b5fd;
            word-break: break-all;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            color: #a78bfa;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container" id="content">
    <div class="spinner"></div>
    <h2>Processing authorization...</h2>
    <p>Please wait while we connect your TikTok account.</p>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const state = params.get('state');
    const container = document.getElementById('content');

    if (error) {
        container.innerHTML = `
            <h2 class="error">Authorization Failed</h2>
            <p>Error: ${error}</p>
            <p>${params.get('error_description') || ''}</p>
            <a href="demo.html">&larr; Back to Dashboard</a>
        `;
    } else if (code) {
        // Store the auth code for the demo
        sessionStorage.setItem('tiktok_auth_code', code);
        sessionStorage.setItem('tiktok_auth_state', state || '');
        container.innerHTML = `
            <h2 class="success">&#10003; TikTok Account Connected!</h2>
            <p>Authorization successful. Redirecting to dashboard...</p>
            <code>Authorization code received</code>
            <a href="demo.html">&larr; Back to Dashboard</a>
        `;
        // Auto redirect after 2 seconds
        setTimeout(() => { window.location.href = 'demo.html'; }, 2000);
    } else {
        container.innerHTML = `
            <h2 class="error">No Authorization Data</h2>
            <p>No authorization code was received.</p>
            <a href="demo.html">&larr; Back to Dashboard</a>
        `;
    }
</script>
</body>
</html>
